name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Lint
      run: npm run lint

    - name: Typecheck and build
      run: npm run build

    - name: Run unit tests
      run: npm run test:unit

    - name: Run component tests
      run: npm run test:component

    - name: Run integration tests
      run: npm run test:integration

    - name: Run coverage
      run: npm run test:coverage

    - name: Install Playwright browsers
      run: npx playwright install --with-deps

    - name: Run E2E tests (issue #30 dashboard)
      run: npm run test:e2e -- --grep "Issue #30"

    - name: Run E2E tests (send flow)
      run: npm run test:e2e -- --grep "Send Flow"

    - name: Run full E2E suite
      run: npm run test:e2e

  merge-analytics:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test

    steps:
    - name: Send merge analytics (issue-30)
      env:
        MERGE_ANALYTICS_URL: ${{ secrets.MERGE_ANALYTICS_URL }}
      run: |
        if [ -z "$MERGE_ANALYTICS_URL" ]; then
          echo "MERGE_ANALYTICS_URL secret not configured; skipping analytics POST"
          exit 0
        fi
        curl -X POST "$MERGE_ANALYTICS_URL" \
          -H "Content-Type: application/json" \
          -d '{
            "event": "merge",
            "repository": "${{ github.repository }}",
            "branch": "${{ github.ref_name }}",
            "commit": "${{ github.sha }}",
            "timestamp": "'$(date -u +"%Y-%m-%dT%H:%M:%SZ")'",
            "author": "${{ github.actor }}",
            "issue": 30,
            "status": "success",
            "coverage_verified": true
          }'
