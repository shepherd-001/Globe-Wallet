name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      # The app validates these required, non-secret settings at startup.
      NEXT_PUBLIC_STELLAR_NETWORK: testnet
      STELLAR_HORIZON_URL: https://horizon-testnet.stellar.org

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install dependencies
      # This repository does not commit an npm lockfile, so npm ci cannot run.
      run: npm install --legacy-peer-deps

    - name: Dependency vulnerability gate
      # Fails on moderate+ advisories unless explicitly allowlisted in
      # security/npm-audit-allowlist.json with a documented reason.
      run: npm run audit:gate

    - name: Soroban contract synchronization check
      # Fails if contracts/soroban-spec.json diverges from the contract source.
      run: npm run check:soroban-sync

    - name: Typecheck and build
      run: npm run build

    - name: Run unit tests
      run: npm run test:unit

    - name: Run component tests
      run: npm run test:component

    - name: Run integration tests
      run: npm run test:integration

    - name: Run accessibility component tests (Issue #24)
      run: npm run test:a11y

    - name: Run coverage
      run: npm run test:coverage

    - name: Install Playwright browsers
      run: npx playwright install --with-deps

    - name: Run E2E tests (issue #17 chart Recharts types)
      run: 'npm run test:e2e -- --grep "Issue #17"'

    - name: Run E2E tests (issue #30 dashboard)
      run: 'npm run test:e2e -- --grep "Issue #30"'

    - name: Run E2E tests (issue #11 federated send)
      run: 'npm run test:e2e -- --grep "Issue #11"'

    - name: Run E2E tests (send flow)
      run: npm run test:e2e -- --grep "Send Flow"

    - name: Run E2E tests (onboarding flow)
      run: npm run test:e2e -- --grep "@critical"

    - name: Run E2E tests (issue #14 mock centralization)
      run: 'npm run test:e2e -- --grep "Issue #14"'

    - name: Run E2E tests (issue #21 payout validation)
      run: 'npm run test:e2e -- --grep "Issue #21"'

    - name: Run E2E accessibility tests (Issue #24)
      run: npm run test:a11y:e2e

    - name: Run E2E tests (issue #16 app shell a11y)
      run: 'npm run test:e2e -- --grep "@shell-a11y"'
    - name: Run E2E tests (issue #15 analytics)
      run: 'npm run test:e2e -- --grep "@analytics"'
    - name: Run E2E tests (issue #13 transaction history)
      run: 'npm run test:e2e -- --grep "@transaction-history"'

    - name: Run full E2E suite
      run: npm run test:e2e


    - name: Issue #19 - Run issue-19 unit tests
      run: npx jest tests/unit/analytics.service.test.ts --silent

    - name: Issue #19 - Run issue-19 component tests
      run: npx jest tests/component/TestCoverageCard.test.tsx --silent

    - name: Issue #19 - Run issue-19 integration tests
      run: npx jest tests/integration/health-api.test.ts --silent

    - name: Issue #19 - Run health check E2E tests
      run: 'npm run test:e2e -- --grep "Health Check API"'

  merge-analytics:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Send merge analytics
      env:
        MERGE_ANALYTICS_URL: ${{ secrets.MERGE_ANALYTICS_URL }}
      run: |
        if [ -z "$MERGE_ANALYTICS_URL" ]; then
          echo "MERGE_ANALYTICS_URL secret not configured; skipping analytics POST"
          exit 0
        fi
        curl -X POST "$MERGE_ANALYTICS_URL" \
          -H "Content-Type: application/json" \
          -d '{
            "event": "merge",
            "repository": "${{ github.repository }}",
            "branch": "${{ github.ref_name }}",
            "commit": "${{ github.sha }}",
            "timestamp": "'$(date -u +"%Y-%m-%dT%H:%M:%SZ")'",
            "author": "${{ github.actor }}",
            "issue": 24,
            "issues": [11, 14, 15, 16, 17, 19, 21, 23, 24, 25, 28, 30],
            "status": "success",
            "coverage_verified": true,
            "fixture_coverage_verified": true,
            "accessibility_verified": true,
            "federation_lookup_verified": true
          }'
